<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mhoo Yim · Survey Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c1a;
  --bg2:#080f20;
  --surface:#0c1428;
  --card:#0f1a32;
  --card2:#111e38;
  --border:rgba(100,160,255,0.12);
  --border-hi:rgba(100,160,255,0.28);
  --accent:#5ba3ff;
  --accent2:#7ec8ff;
  --accent3:#3d7de0;
  --glow:rgba(91,163,255,0.18);
  --text:#cde0ff;
  --text-dim:rgba(180,210,255,0.45);
  --text-mid:rgba(180,210,255,0.72);
  --green:#4dd98a;
  --red:#ff7070;
  --gold:#ffd06a;
  --bar-h:34px;
  --r:12px;
}

html{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:16px;line-height:1.65}
body{min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(30,60,140,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(20,40,110,0.25) 0%, transparent 60%);
}

/* ── HEADER ── */
.hd{
  background:linear-gradient(135deg,rgba(15,30,70,0.95) 0%,rgba(8,15,32,0.85) 100%);
  border-bottom:1px solid var(--border-hi);
  padding:20px 32px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  backdrop-filter:blur(12px);
  position:relative;
}
.hd::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4;
}
.hd-left{display:flex;flex-direction:column;gap:4px}
.hd-title{font-size:1.35rem;font-weight:700;letter-spacing:0.03em;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hd-sub{font-size:0.82rem;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase}
.hd-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hd-sample{
  background:linear-gradient(135deg,rgba(91,163,255,0.12),rgba(91,163,255,0.06));
  border:1px solid var(--border-hi);border-radius:100px;
  padding:7px 20px;font-size:0.9rem;font-weight:600;color:var(--accent2);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.hd-sample-n{font-family:'IBM Plex Mono',monospace;font-size:1.25rem;font-weight:500;color:var(--accent2)}
.btn-refresh{
  display:flex;align-items:center;gap:7px;padding:7px 18px;border-radius:100px;
  border:1px solid var(--border-hi);background:rgba(91,163,255,0.06);
  color:var(--text-mid);font-family:'Sarabun',sans-serif;font-size:0.85rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,163,255,0.12)}
.btn-refresh.loading .ref-icon{animation:spin 0.8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.data-badge{font-size:0.75rem;color:var(--text-dim);letter-spacing:0.05em}
.data-badge.live{color:var(--green)}
.data-badge.fallback{color:var(--gold)}

/* ── STATUS BAR ── */
.status-bar{
  padding:8px 32px;font-size:0.78rem;
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.25);border-bottom:1px solid var(--border);
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.loading{background:var(--gold);animation:pdot 1s ease infinite}
.status-dot.error{background:var(--red)}
@keyframes pdot{0%,100%{opacity:0.35}50%{opacity:1}}
#statusText{color:var(--text-dim);font-size:0.78rem}

/* ── TAB BAR ── */
.tab-bar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  padding:0 32px;background:var(--surface);
  position:sticky;top:0;z-index:200;overflow-x:auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.tab-group{display:flex;flex-direction:column;position:relative}
.tab-main{
  display:flex;align-items:center;gap:7px;
  padding:14px 20px 12px;
  font-family:'Sarabun',sans-serif;font-size:0.92rem;font-weight:600;
  letter-spacing:0.04em;text-transform:uppercase;
  cursor:pointer;border:none;background:transparent;
  color:var(--text-dim);border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;
}
.tab-main:hover{color:var(--text)}
.tab-main.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* ── SUB TAB ROW (second row, shown when Food/Wholesale active) ── */
.sub-tab-bar{
  display:none;
  align-items:center;gap:0;
  border-bottom:1px solid var(--border);
  padding:0 32px;
  background:rgba(8,15,32,0.98);
  overflow-x:auto;
  position:sticky;top:49px;z-index:199;
}
.sub-tab-bar.visible{display:flex}
.sub-tab-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px 8px;
  font-family:'Sarabun',sans-serif;font-size:0.85rem;font-weight:500;
  cursor:pointer;border:none;background:transparent;
  color:var(--text-dim);border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;
}
.sub-tab-btn:hover{color:var(--text)}
.sub-tab-btn.active{color:var(--accent);border-bottom-color:rgba(91,163,255,0.5)}
.sub-tab-count{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;opacity:0.5;margin-left:4px}

/* ── MAIN LAYOUT ── */
.main{padding:28px 32px;display:flex;flex-direction:column;gap:24px;max-width:1440px;margin:0 auto}

/* ── LOADING ── */
.loading-overlay{display:none;align-items:center;justify-content:center;padding:80px 20px;flex-direction:column;gap:16px}
.loading-overlay.visible{display:flex}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{font-size:0.9rem;color:var(--text-dim);letter-spacing:0.1em}

/* ── SECTION HEADER ── */
.sec-h{
  font-size:0.76rem;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--accent);font-weight:600;
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.sec-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-hi),transparent)}

/* ── GRIDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ── CARDS ── */
.card{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border:1px solid var(--border);border-radius:var(--r);
  padding:20px 22px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.card:hover{border-color:var(--border-hi);box-shadow:0 4px 24px rgba(91,163,255,0.08)}
.card-label{
  font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:12px;font-weight:500;
}
.card-val{
  font-size:2.4rem;font-weight:700;
  font-family:'IBM Plex Mono',monospace;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.card-val-sm{
  font-size:1.6rem;font-weight:600;
  font-family:'IBM Plex Mono',monospace;color:var(--accent2);
}
.card-sub{font-size:0.84rem;color:var(--text-dim);margin-top:6px}

/* ── KPI CARD SPECIAL ── */
.kpi-card{
  background:linear-gradient(145deg,rgba(91,163,255,0.1),rgba(30,60,140,0.15));
  border:1px solid rgba(91,163,255,0.22);
  border-radius:var(--r);padding:22px 24px;
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
}

/* ── BAR CHART ── */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-item{display:flex;align-items:center;gap:12px}
.bar-name{
  font-size:0.9rem;color:var(--text-mid);
  white-space:nowrap;flex:0 0 auto;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;
}
.bar-track{
  flex:1;background:rgba(255,255,255,0.04);
  border-radius:6px;height:var(--bar-h);
  position:relative;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:6px;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  background:linear-gradient(90deg,var(--accent3),var(--accent));
  display:flex;align-items:center;padding-left:10px;min-width:40px;
}
.bar-pct{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;font-weight:500;color:rgba(255,255,255,0.9);white-space:nowrap}
.bar-count{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--text-dim);flex-shrink:0;min-width:28px;text-align:right}

/* ── RANKING CHART ── */
.rank-list{display:flex;flex-direction:column;gap:12px}
.rank-item{display:flex;align-items:center;gap:12px}
.rank-pos{
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  color:var(--text-dim);flex-shrink:0;width:20px;text-align:center;
}
.rank-label{font-size:0.9rem;color:var(--text-mid);flex:1;min-width:0}
.rank-avg{
  font-family:'IBM Plex Mono',monospace;font-size:0.92rem;font-weight:500;
  color:var(--accent2);flex-shrink:0;width:42px;text-align:right;
}
.rank-track{flex:0 0 120px;background:rgba(255,255,255,0.05);border-radius:6px;height:10px;overflow:hidden}
.rank-fill{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--accent3),var(--accent2));
  transition:width 0.6s;
}

/* ── PIE / DONUT ── */
.pie-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.pie-svg{flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:8px;flex:1;min-width:120px}
.pie-entry{display:flex;align-items:center;gap:9px;font-size:0.88rem;color:var(--text-mid)}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-val{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--text-dim);white-space:nowrap}

/* ── MULTI CHECK BADGES ── */
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.tag-item{
  display:flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:100px;
  background:rgba(91,163,255,0.08);border:1px solid var(--border);
  font-size:0.85rem;color:var(--text-mid);
}
.tag-item-count{
  font-family:'IBM Plex Mono',monospace;font-size:0.78rem;
  color:var(--accent);font-weight:500;
}

/* ── NUMERIC SUMMARY ── */
.num-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:4px}
.num-box{
  background:rgba(91,163,255,0.06);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;text-align:center;
}
.num-box-val{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:600;color:var(--accent2)}
.num-box-label{font-size:0.78rem;color:var(--text-dim);margin-top:4px}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 20px;color:var(--text-dim);font-size:0.9rem}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(91,163,255,0.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(91,163,255,0.35)}

@media(max-width:1000px){.grid-4{grid-template-columns:1fr 1fr}.main{padding:20px}}
@media(max-width:700px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .main{padding:16px}
  .tab-bar{padding:0 16px}
  .hd{padding:16px}
  html{font-size:15px}
}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-left">
    <div class="hd-title">🥥 Mhoo Yim — Field Survey Dashboard</div>
    <div class="hd-sub">Competitor &amp; Channel Analysis · Bluroca Internal</div>
  </div>
  <div class="hd-right">
    <span class="data-badge" id="dataBadge">⬤ loading…</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadFromSheet()">
      <span class="ref-icon">↻</span> Refresh
    </button>
    <div class="hd-sample">
      <span class="hd-sample-n" id="sampleCount">—</span>
      <span>samples</span>
    </div>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot loading" id="statusDot"></div>
  <span id="statusText">Fetching live data from Google Sheets…</span>
</div>

<nav class="tab-bar" id="tabBar">
  <div class="tab-group" id="tg-market">
    <button class="tab-main active" onclick="setTab('market','all')">Market Overview</button>
  </div>
  <div class="tab-group" id="tg-food">
    <button class="tab-main" onclick="setTab('food','all')">Food Service</button>
  </div>
  <div class="tab-group" id="tg-wholesale">
    <button class="tab-main" onclick="setTab('wholesale','all')">Wholesale</button>
  </div>
</nav>

<!-- Second row: sub-filters per ประเภทร้าน (shown when Food or Wholesale active) -->
<nav class="sub-tab-bar" id="subTabBar"></nav>

<div class="loading-overlay visible" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">กำลังโหลดข้อมูล…</div>
</div>

<main class="main" id="dashMain" style="display:none"></main>

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  const headers = splitCSVRow(lines[0]);
  const records = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVRow(lines[i]);
    if (vals.every(v => !v.trim())) continue;
    const rec = {};
    headers.forEach((h, idx) => {
      const v = (vals[idx] || '').trim();
      rec[h.trim()] = v === '' ? null : coerce(v);
    });
    records.push(rec);
  }
  return records;
}

function splitCSVRow(row) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"') { if (inQ && row[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

function coerce(v) {
  if (!v) return null;
  const n = Number(v);
  return (!isNaN(n) && v !== '') ? n : v;
}

// ── LIVE FETCH ──
async function loadFromSheet() {
  setStatus('loading', 'กำลังดึงข้อมูลจาก Google Sheets…');
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  try {
    const res = await fetch(CSV_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('Empty');
    allRecords = rows;
    dataSource = 'live';
    const now = new Date().toLocaleTimeString('th-TH');
    setStatus('live', `Live data · ${rows.length} rows · Updated ${now}`);
    document.getElementById('dataBadge').textContent = `⬤ Live · ${now}`;
    document.getElementById('dataBadge').className = 'data-badge live';
  } catch(e) {
    allRecords = FALLBACK.records;
    dataSource = 'fallback';
    setStatus('error', `ไม่สามารถเชื่อมต่อ Google Sheets ได้ — แสดงข้อมูลสำรอง (${FALLBACK.records.length} rows)`);
    document.getElementById('dataBadge').textContent = '⬤ Cached data';
    document.getElementById('dataBadge').className = 'data-badge fallback';
  }
  btn.classList.remove('loading');
  document.getElementById('loadingOverlay').classList.remove('visible');
  document.getElementById('dashMain').style.display = '';
  buildSubRow();
  render();
}

function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function setTab(tab, sub) {

function buildSubRow() {

// ── STATS ──
function countValues(records, col) {
  const map = {};
  records.forEach(r => {
    const v = r[col];
    if (v == null) return;
    String(v).split(',').map(s=>s.trim()).filter(Boolean).forEach(s => {
      map[s] = (map[s]||0) + 1;
    });
  });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}

function avgNum(records, col) {
  const vals = records.map(r=>r[col]).filter(v=>v!=null && !isNaN(Number(v))).map(Number);
  if (!vals.length) return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length);
}

function pctOf(n, total) { return total ? Math.round(n/total*100)+'%' : '0%'; }

// ── PIE SVG ──
const PC = ['#5ba3ff','#7ec8ff','#3d7de0','#a0d4ff','#2a5cbf','#b8dfff','#1e4499','#c8e8ff'];
function makePie(entries, total, size=110) {
  let angle = 0;
  const cx=size/2,cy=size/2,r=size/2-7,ir=r*0.52;
  let paths = '';
  entries.forEach(([,count],i) => {
    const frac=count/total; if(!frac) return;
    const a1=angle,a2=angle+frac*2*Math.PI,large=frac>0.5?1:0;
    const x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1);
    const x2=cx+r*Math.sin(a2),y2=cy-r*Math.cos(a2);
    const ix1=cx+ir*Math.sin(a1),iy1=cy-ir*Math.cos(a1);
    const ix2=cx+ir*Math.sin(a2),iy2=cy-ir*Math.cos(a2);
    paths += `<path d="M ${ix1} ${iy1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z" fill="${PC[i%PC.length]}" stroke="var(--bg)" stroke-width="2"/>`;
    angle=a2;
  });
  return `<svg class="pie-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

// ── CHART BUILDERS ──
function buildBar(entries, total) {
  if (!entries.length) return '<div class="empty">ไม่มีข้อมูล</div>';
  const max = entries[0][1];
  return '<div class="bar-list">'+entries.map(([name,count]) => {
    const pct=Math.round(count/total*100), w=Math.round(count/max*100);
    return `<div class="bar-item">
      <span class="bar-name" title="${name}">${name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%"><span class="bar-pct">${pct}%</span></div></div>
      <span class="bar-count">${count}</span>
    </div>`;
  }).join('')+'</div>';
}

function buildPie(entries, total) {
  if (!entries.length) return '<div class="empty">ไม่มีข้อมูล</div>';
  const svg = makePie(entries, total);
  const legend = entries.map(([label,count],i) =>
    `<div class="pie-entry">
      <span class="pie-dot" style="background:${PC[i%PC.length]}"></span>
      <span>${label}</span>
      <span class="pie-val">${count} · ${pctOf(count,total)}</span>
    </div>`).join('');
  return `<div class="pie-wrap">${svg}<div class="pie-legend">${legend}</div></div>`;
}

function buildRank(records, rankFields) {
  const items = rankFields.map(col => {
    const shortName = col.replace(/.*\[(.+)\]/, '$1').trim();
    const avg = avgNum(records, col);
    return {col, shortName, avg: avg!=null ? parseFloat(avg.toFixed(2)) : null};
  }).filter(x=>x.avg!==null).sort((a,b)=>b.avg-a.avg);
  if (!items.length) return '<div class="empty">ไม่มีข้อมูล</div>';
  return '<div class="rank-list">'+items.map((item,i) => {
    const w = Math.round(item.avg/4*100);
    return `<div class="rank-item">
      <span class="rank-pos">${i+1}</span>
      <span class="rank-label">${item.shortName}</span>
      <div class="rank-track"><div class="rank-fill" style="width:${w}%"></div></div>
      <span class="rank-avg">${item.avg.toFixed(2)}</span>
    </div>`;
  }).join('')+'</div>';
}

function buildTagCloud(entries, total) {
  if (!entries.length) return '<div class="empty">ไม่มีข้อมูล</div>';
  return '<div class="tag-cloud">'+entries.map(([name,count]) =>
    `<span class="tag-item">${name} <span class="tag-item-count">${count} · ${pctOf(count,total)}</span></span>`
  ).join('')+'</div>';
}

function buildNumSummary(records, cols) {
  // Show avg / most common for numeric columns
  const boxes = cols.map(col => {
    const entries = countValues(records, col);
    const numVals = records.map(r=>r[col]).filter(v=>v!=null && !isNaN(Number(v))).map(Number);
    let display = '—';
    if (numVals.length) {
      const avg = (numVals.reduce((a,b)=>a+b,0)/numVals.length).toFixed(1);
      display = avg;
    } else if (entries.length) {
      display = entries[0][0]; // most common text value
    }
    const shortCol = col.replace('จำนวน','').trim();
    return `<div class="num-box"><div class="num-box-val">${display}</div><div class="num-box-label">${shortCol}</div></div>`;
  });
  return `<div class="num-grid">${boxes.join('')}</div>`;
}

        else widget = buildBar(entries, records.length);
        html += `<div class="card"><div class="card-label">${col}</div>${widget}</div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  });

  document.getElementById('dashMain').innerHTML = html;
}
